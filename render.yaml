services:
  - type: web
    name: sentinel
    runtime: python
    plan: free
    buildCommand: pip install --no-cache-dir --prefer-binary -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 180
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        value: sentinel-prod-jwt-secret-2024
      - key: APP_VERSION
        value: 4.0.0
      - key: COST_PER_INCIDENT
        value: 4500
      - key: IMAP_SERVER
        value: imap.gmail.com
      - key: IMAP_PORT
        value: 993
      - key: IMAP_POLL_INTERVAL
        value: 30
    healthCheckPath: /api/v1/health
    autoDeploy: true
