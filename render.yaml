services:
  - type: web
    name: sentinel
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --host 0.0.0.0 --port $PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: APP_VERSION
        value: 3.0.0
      - key: COST_PER_INCIDENT
        value: 4500
      - key: IMAP_SERVER
        value: imap.gmail.com
      - key: IMAP_PORT
        value: 993
      - key: IMAP_POLL_INTERVAL
        value: 30
    healthCheckPath: /api/v1/health
    autoDeploy: true
