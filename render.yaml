services:
  - type: web
    name: sentinel
    runtime: docker
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        value: sentinel-prod-jwt-secret-2024
      - key: APP_VERSION
        value: 4.0.0
      - key: COST_PER_INCIDENT
        value: 4500
      - key: IMAP_SERVER
        value: imap.gmail.com
      - key: IMAP_PORT
        value: 993
      - key: IMAP_POLL_INTERVAL
        value: 30
    healthCheckPath: /api/v1/health
    autoDeploy: true
